# setBfree VB3-II style tuning
# Based on GSi VB3-II characteristics: rich crosstalk, prominent key click,
# warm Leslie, subtle overdrive

# --- Tuning ---
osc.tuning=440.0
osc.temperament=gear60

# --- Key Click (VB3-II is known for prominent, musical click) ---
osc.attack.model=click
osc.attack.click.level=0.75
osc.attack.click.maxlength=0.80
osc.attack.click.minlength=0.20
osc.release.model=linear
osc.release.click.level=0.40

# --- Serial Contact Switching (velocity-dependent staggered bus activation) ---
osc.contact.serial=1
osc.contact.stagger.slow=30.0
osc.contact.stagger.fast=0.5

# --- Crosstalk (VB3-II has rich, warm crosstalk / "leakage") ---
osc.compartment-crosstalk=0.04
osc.transformer-crosstalk=0.02
osc.terminalstrip-crosstalk=0.03
osc.wiring-crosstalk=0.02

# --- Percussion ---
osc.perc.fast=1.0
osc.perc.slow=3.6
osc.perc.gain=11.0
osc.perc.normal=1.0
osc.perc.soft=0.5012

# --- Vibrato / Chorus (scanner) ---
scanner.hz=7.25
scanner.modulation.v1=3.0
scanner.modulation.v2=6.5
scanner.modulation.v3=10.0

# --- Leslie ---
whirl.horn.slowrpm=40.32
whirl.horn.fastrpm=400.0
whirl.horn.acceleration=0.165
whirl.horn.deceleration=0.35
whirl.drum.slowrpm=36.0
whirl.drum.fastrpm=330.0
whirl.drum.acceleration=4.5
whirl.drum.deceleration=1.5

# Leslie mic position (close, wide stereo)
whirl.mic.distance=42.0
whirl.horn.radius=19.2
whirl.horn.mic.angle=165.0
whirl.horn.level=0.72
whirl.horn.leak=0.18

# Leslie horn filter (soften high-end for warmth)
whirl.horn.filter.a.type=0
whirl.horn.filter.a.hz=4000.0
whirl.horn.filter.a.q=2.5
whirl.horn.filter.a.gain=-28.0

# Leslie drum filter
whirl.drum.filter.type=8
whirl.drum.filter.hz=800.0
whirl.drum.filter.q=1.6
whirl.drum.filter.gain=-38.0

# --- Overdrive (subtle warmth, not aggressive) ---
overdrive.inputgain=0.3567
overdrive.outputgain=0.07873
xov.ctl_biased=0.5347
xov.ctl_biased_gfb=0.6214
xov.ctl_biased_fb=0.5821
xov.ctl_biased_fb2=0.999
xov.ctl_sagtobias=0.1880

# --- Reverb (light spring reverb) ---
reverb.wet=0.08
reverb.dry=0.92
reverb.inputgain=0.08
reverb.mix=0.08
