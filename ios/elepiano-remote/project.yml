name: elepiano-remote
options:
  bundleIdPrefix: com.hakaru.elepiano
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  elepiano-remote:
    type: application
    platform: iOS
    sources:
      - path: elepiano-remote
        excludes:
          - Info.plist
    info:
      path: elepiano-remote/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "elepiano Remote uses Bluetooth to control your elepiano synthesizer."
        UILaunchScreen: {}
        CFBundleDisplayName: "elepiano"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.hakaru.elepiano.remote
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      DEVELOPMENT_TEAM: "K38MBRNKAT"
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1,2"
